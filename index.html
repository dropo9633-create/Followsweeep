<!DOCTYPE html>
<html>
<head>
    <title>Followsweep</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #111;
            --text: #fff;
            --card: #222;
            --button: #333;
            --border: #444;
        }

        .light {
            --bg: #f5f5f5;
            --text: #111;
            --card: #fff;
            --button: #ddd;
            --border: #bbb;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: Arial;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        button {
            padding: 10px 14px;
            margin: 5px;
            font-size: 15px;
            background: var(--button);
            color: var(--text);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: var(--card);
            color: var(--text);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .instructions,
        .stats {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .custom-file {
            display: inline-block;
            background: var(--button);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .file-name {
            font-size: 13px;
            opacity: 0.7;
        }

        .user {
            background: var(--card);
            padding: 14px;
            border-radius: 12px;
        }

        .user.done {
            opacity: 0.4;
            text-decoration: line-through;
        }

        .progress-wrap {
            background: var(--button);
            height: 6px;
            border-radius: 999px;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            background: var(--text);
            width: 0%;
            border-radius: 999px;
        }

        /* 📱 Mobile buttons */
        @media (max-width: 600px) {
            .user button {
                display: block;
                width: 100%;
                margin: 6px 0;
            }
        }

        /* 💻 Desktop grid layout */
        @media (min-width: 900px) {
            #output {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 15px;
            }
        }

        /* Floating banner */
        #onetab-banner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid var(--button);
            padding: 14px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        #onetab-banner button {
            width: 100%;
            margin-top: 6px;
        }
    </style>
</head>

<body>

<div class="topbar">
    <h2>Followsweep 🚀</h2>
    <button onclick="toggleTheme()">Change Theme</button>
</div>

<div class="instructions">
    <h3>📘 How to Use</h3>
    <ol>
        <li>Instagram → Settings → Accounts Center</li>
        <li>Download Followers & Following (JSON)</li>
        <li>Upload below</li>
        <li>Click Show Unfollowers</li>
    </ol>
</div>

<div>
    <label class="custom-file">
        Followers list
        <input type="file" id="followersFile" hidden>
    </label>
    <div id="followersName" class="file-name">No file selected</div>

    <label class="custom-file">
        Following list
        <input type="file" id="followingFile" hidden>
    </label>
    <div id="followingName" class="file-name">No file selected</div>
</div>

<button onclick="processData()">Show Unfollowers</button>

<div class="stats">
    <div id="followersCount">Followers: 0</div>
    <div id="followingCount">Following: 0</div>
    <div id="doneCount">Done: 0</div>
</div>

<div class="progress-wrap">
    <div id="progressBar" class="progress-bar"></div>
</div>

<input id="searchBox" placeholder="Search username..." oninput="filterUsers()">

<h3 id="count"></h3>
<div id="output"></div>

<a id="ig-link" target="ig_tab" style="display:none"></a>

<div id="onetab-banner">
    <div>Opened <b id="banner-user">@user</b></div>
    <button onclick="markCurrentDone()">Done → Next</button>
    <button onclick="skipCurrent()">Skip</button>
    <button onclick="closeBanner()">Close</button>
</div>

<script>
const followersFile = document.getElementById("followersFile");
const followingFile = document.getElementById("followingFile");
const followersName = document.getElementById("followersName");
const followingName = document.getElementById("followingName");
const output = document.getElementById("output");
const count = document.getElementById("count");
const progressBar = document.getElementById("progressBar");
const doneCount = document.getElementById("doneCount");

let allUsers = [];
let doneSet = new Set(JSON.parse(localStorage.getItem('fs_done') || '[]'));
let currentUser = null;

followersFile.onchange = () => followersName.innerText = followersFile.files[0]?.name;
followingFile.onchange = () => followingName.innerText = followingFile.files[0]?.name;

function extractUsernames(data) {
    let usernames = [];
    function scan(obj) {
        if (Array.isArray(obj)) obj.forEach(scan);
        else if (obj && typeof obj === "object") {
            if (obj.value) usernames.push(obj.value);
            if (obj.title) usernames.push(obj.title);
            for (let k in obj) scan(obj[k]);
        }
    }
    scan(data);
    return [...new Set(usernames)];
}

function processData() {
    if (!followersFile.files[0] || !followingFile.files[0]) return alert("Upload both!");

    let r1 = new FileReader();
    let r2 = new FileReader();

    r1.onload = () => {
        let followers = extractUsernames(JSON.parse(r1.result));

        r2.onload = () => {
            let following = extractUsernames(JSON.parse(r2.result));
            followersCount.innerText = "Followers: " + followers.length;
            followingCount.innerText = "Following: " + following.length;

            let non = following.filter(x => !new Set(followers).has(x));
            display(non);
        };

        r2.readAsText(followingFile.files[0]);
    };

    r1.readAsText(followersFile.files[0]);
}

function display(list) {
    allUsers = list;
    output.innerHTML = "";
    count.innerText = "Non-followers: " + list.length;
    list.forEach(createCard);
    updateProgress();
}

function createCard(u) {
    let div = document.createElement("div");
    div.className = "user" + (doneSet.has(u) ? " done" : "");
    div.innerHTML = `
        <b>${u}</b><br>
        <button onclick="openOneTab('${u}')">Unfollow</button>
        <button onclick="navigator.clipboard.writeText('${u}')">Copy</button>
        <button onclick="markDone('${u}')">Done</button>
    `;
    output.appendChild(div);
}

function filterUsers() {
    let q = searchBox.value.toLowerCase();
    output.innerHTML = "";
    allUsers.filter(u => u.includes(q)).forEach(createCard);
}

function openOneTab(u) {
    currentUser = u;
    ig_link.href = "https://www.instagram.com/" + u + "/";
    ig_link.click();
    banner_user.innerText = '@' + u;
    onetab_banner.style.display = 'block';
}

function markCurrentDone() {
    if (currentUser) markDone(currentUser);
    closeBanner();
    let next = allUsers.find(u => !doneSet.has(u));
    if (next) openOneTab(next);
}

function skipCurrent() {
    let next = allUsers.find(u => !doneSet.has(u) && u !== currentUser);
    closeBanner();
    if (next) openOneTab(next);
}

function closeBanner() {
    onetab_banner.style.display = 'none';
    currentUser = null;
}

function markDone(u) {
    doneSet.add(u);
    localStorage.setItem('fs_done', JSON.stringify([...doneSet]));
    display(allUsers);
}

function updateProgress() {
    let done = allUsers.filter(u => doneSet.has(u)).length;
    doneCount.innerText = `Done: ${done}/${allUsers.length}`;
    progressBar.style.width = (done / allUsers.length * 100 || 0) + '%';
}

function toggleTheme() {
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
